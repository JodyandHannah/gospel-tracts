<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jody Esguerra — Gospel Tracts</title>
  <meta name="description" content="Free gospel tracts by Jody Esguerra — download and share." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f7f6f2;
      color: #1a1a18;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem 4rem;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; color: #f0efe9; }
    }

    .page { width: 100%; max-width: 480px; }

    .avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: #1D9E75;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
    }
    .avatar i { font-size: 30px; color: #fff; }

    .name {
      font-family: 'Playfair Display', serif;
      font-size: 24px; font-weight: 700;
      text-align: center;
      margin-bottom: 0.35rem;
    }

    .tagline {
      font-size: 14px;
      color: #6b6b67;
      text-align: center;
      margin-bottom: 2.5rem;
      line-height: 1.5;
    }

    @media (prefers-color-scheme: dark) {
      .tagline { color: #9e9e99; }
    }

    .section-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #aaa9a4;
      margin-bottom: 0.75rem;
      padding-left: 2px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.1);
      border-radius: 14px;
      text-decoration: none;
      color: inherit;
      margin-bottom: 0.75rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .card:hover { border-color: rgba(0,0,0,0.25); }
    .card:focus-visible { outline: 3px solid #1D9E75; outline-offset: 2px; }

    @media (prefers-color-scheme: dark) {
      .card { background: #272723; border-color: rgba(255,255,255,0.08); }
      .card:hover { border-color: rgba(255,255,255,0.2); }
    }

    .icon {
      width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .icon-green  { background: #E1F5EE; color: #0F6E56; }
    .icon-coral  { background: #FAECE7; color: #993C1D; }
    .icon-purple { background: #EEEDFE; color: #534AB7; }

    @media (prefers-color-scheme: dark) {
      .icon-green  { background: #085041; color: #5DCAA5; }
      .icon-coral  { background: #4A1B0C; color: #F0997B; }
      .icon-purple { background: #26215C; color: #AFA9EC; }
    }

    .card-text { flex: 1; }

    .card-title {
      font-size: 15px; font-weight: 500;
      color: inherit;
      margin-bottom: 2px;
    }

    .card-sub {
      font-size: 13px;
      color: #6b6b67;
    }

    @media (prefers-color-scheme: dark) {
      .card-sub { color: #9e9e99; }
    }

    .dl-btn {
      width: 36px; height: 36px; border-radius: 8px;
      background: #f0efe9;
      display: flex; align-items: center; justify-content: center;
      color: #6b6b67;
      flex-shrink: 0;
      font-size: 16px;
    }

    @media (prefers-color-scheme: dark) {
      .dl-btn { background: #1a1a18; color: #9e9e99; }
    }

    footer {
      text-align: center;
      font-size: 12px;
      color: #aaa9a4;
      margin-top: 2.5rem;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="avatar" aria-hidden="true">
      <i class="ti ti-cross"></i>
    </div>

    <h1 class="name">Jody Esguerra</h1>
    <p class="tagline">Free gospel tracts — download and share freely.</p>

    <p class="section-label">Gospel Tracts</p>

    <a class="card" href="tracts/the-ultimate-comeback.pdf" download>
      <div class="icon icon-green" aria-hidden="true"><i class="ti ti-ball-basketball"></i></div>
      <div class="card-text">
        <p class="card-title">The Ultimate Comeback</p>
        <p class="card-sub">Basketball · English</p>
      </div>
      <div class="dl-btn" aria-hidden="true"><i class="ti ti-download"></i></div>
    </a>

    <a class="card" href="tracts/uwi-na-tayo.pdf" download>
      <div class="icon icon-coral" aria-hidden="true"><i class="ti ti-home-heart"></i></div>
      <div class="card-text">
        <p class="card-title">Uwi Na Tayo</p>
        <p class="card-sub">OFW homecoming · Tagalog</p>
      </div>
      <div class="dl-btn" aria-hidden="true"><i class="ti ti-download"></i></div>
    </a>

    <a class="card" href="tracts/life-series.pdf" download>
      <div class="icon icon-purple" aria-hidden="true"><i class="ti ti-sparkles"></i></div>
      <div class="card-text">
        <p class="card-title">The L.I.F.E. Series</p>
        <p class="card-sub">Youth / anime aesthetic · English</p>
      </div>
      <div class="dl-btn" aria-hidden="true"><i class="ti ti-download"></i></div>
    </a>

    <footer>Prodigals Ministry · Ballymena, Northern Ireland</footer>
  </main>
</body>
</html>
